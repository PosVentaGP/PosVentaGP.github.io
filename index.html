<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Grupo Ferretero</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .grid-apps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05));
            pointer-events: none;
        }

        .app-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .app-name {
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            text-align: center;
        }

        .status {
            font-size: 0.7rem;
            background: #22c55e33;
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 10px;
        }

        /* Colores temáticos por botón */
        .card-simasur:hover { box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        .card-witzi:hover { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .card-bazar:hover { box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }
        .card-pintor:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .card-yza:hover { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }

        /* Estilo brillante para Boxito (Rojo de la marca) */
        .card-boxito:hover {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        @media (max-width: 600px) {
            .grid-apps {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>GEFTE POS SYSTEM</h1>
        <p>Seleccione el punto de venta para iniciar</p>

        <div class="grid-apps">
            <a href="simasur/index.html" class="app-card card-simasur">
                <div class="icon">🏗️</div>
                <div class="app-name">SIMASUR</div>
                <div class="status">SISTEMA LISTO</div>
            </a>

            <a href="witzi/index.html" class="app-card card-witzi">
                <div class="icon">🛠️</div>
                <div class="app-name">FERRETERIA WITZI</div>
                <div class="status">SISTEMA LISTO</div>
            </a>


            </a>

            <a href="pintor/index.html" class="app-card card-pintor">
                <div class="icon">🎨</div>
                <div class="app-name">PROVEEDOR DEL PINTOR</div>
                <div class="status">SISTEMA LISTO</div>
            </a>

            <a href="bazar/index.html" class="app-card card-bazar">
                <div class="icon">🪛</div>
                <div class="app-name">FERRETERIA EL BAZAR</div>
                <div class="status">SISTEMA LISTO</div>
            </a>

            <a href="http://localhost/impre2/yza" class="app-card card-yza">
                <div class="icon">💊</div>
                <div class="app-name">FARMACIA YZA</div>
                <div class="status">SISTEMA LISTO</div>
            </a>

            <a href="boxito/index.html" class="app-card card-boxito">
                <div class="icon">🏠</div>
                <div class="app-name">FERRETERIA BOXITO</div>
                <div class="status">SISTEMA LISTO</div>
            </a>
        </div>
    </div>

</body>
</html>
